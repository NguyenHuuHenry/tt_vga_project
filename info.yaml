# Tiny Tapeout project information
project:
  title:        "Bezier Curve VGA Rasterizer"
  author:       "Henry Huu Nguyen"
  discord:      "nightw4tch"
  description:  "Quadratic bezier curve rasterizer outputting to 640x480 VGA via a 160x120 packed framebuffer"
  language:     "Verilog"
  clock_hz:     25000000   # 25 MHz VGA pixel clock

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module: "tt_um_bezier_vga"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_bezier_vga.v"
    - "hvsync_generator.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "X coordinate [7:0] bit 0"
  ui[1]: "X coordinate [7:0] bit 1"
  ui[2]: "X coordinate [7:0] bit 2"
  ui[3]: "X coordinate [7:0] bit 3"
  ui[4]: "X coordinate [7:0] bit 4"
  ui[5]: "X coordinate [7:0] bit 5"
  ui[6]: "X/Y coordinate bit 6"
  ui[7]: "X coordinate bit 7"

  # Outputs (TinyVGA PMOD)
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSync"

  # Bidirectional pins (used as inputs: uio_oe = 0)
  uio[0]: "Load X (rising edge latches ui_in[7:0] as X coord)"
  uio[1]: "Load Y (rising edge latches ui_in[6:0] as Y coord)"
  uio[2]: "Add point (rising edge commits staged X,Y as bezier control point)"
  uio[3]: "Submit (rising edge rasterizes current 3 control points)"
  uio[4]: "Clear (rising edge wipes framebuffer)"
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
